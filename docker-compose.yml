version: "3.9"


volumes:
  # Shared volume for Nginx access logs. Nginx writes here, Detector reads here. 
  HNG-nginx-logs:
    driver: local

  # Nextcloud's uploaded files and application data.
  nextcloud-data:
    driver: local

  # PostgreSQL database files.
  db-data:
    driver: local

networks:
  hng-net:
    driver: bridge

services:

  
  db:
    image: postgres:15-alpine
    container_name: hng-db
    restart: unless-stopped

    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-nextcloud}
      POSTGRES_USER:     ${POSTGRES_USER:-nextcloud}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nextcloud_secret}

    volumes:
      # Persist database data on the host so it survives container restarts
      - db-data:/var/lib/postgresql/data

    networks:
      - hng-net

    healthcheck:
      # pg_isready exits 0 when the DB is accepting connections
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nextcloud}"]
      interval: 10s     # check every 10 seconds
      timeout: 5s       # fail the check if no response in 5 seconds
      retries: 5        # mark unhealthy after 5 consecutive failures
      start_period: 10s # give the DB 10 seconds to boot before checking
  
  nextcloud:
    image: kefaslungu/hng-nextcloud:latest
    container_name: hng-nextcloud
    restart: unless-stopped

    # Wait until the database is healthy before starting
    depends_on:
      db:
        condition: service_healthy

    environment:
      # Tell Nextcloud how to connect to PostgreSQL
      POSTGRES_HOST:     db
      POSTGRES_DB:       ${POSTGRES_DB:-nextcloud}
      POSTGRES_USER:     ${POSTGRES_USER:-nextcloud}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nextcloud_secret}

      # Admin account created on first boot
      NEXTCLOUD_ADMIN_USER:     ${NC_ADMIN:-admin}
      NEXTCLOUD_ADMIN_PASSWORD: ${NC_ADMIN_PASS:-changeme}

      
      NEXTCLOUD_TRUSTED_DOMAINS: ${SERVER_IP:-localhost}

    volumes:
      # Nextcloud's files, apps, and config
      - nextcloud-data:/var/www/html
      
      - HNG-nginx-logs:/var/log/nginx:ro

    networks:
      - hng-net

    healthcheck:
      # status.php returns {"installed":true,...} when Nextcloud is ready
      test: ["CMD-SHELL", "curl -sf http://localhost/status.php || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s  # Nextcloud takes a while on first boot (installs DB schema)


  nginx:
    image: nginx:1.25-alpine
    container_name: hng-nginx
    restart: unless-stopped

    depends_on:
      nextcloud:
        condition: service_started

    ports:
      - "80:80"

    volumes:
      # Mount our custom nginx.conf read-only into the container
      # This config enables JSON logging and X-Forwarded-For
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

      # Nginx WRITES logs to this volume (read-write, no :ro)
      # The detector and nextcloud containers mount it read-only
      - HNG-nginx-logs:/var/log/nginx

    networks:
      - hng-net

    healthcheck:
      # nginx -t tests the config syntax — if it passes, nginx is healthy
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3


  detector:
    build:
      # Docker looks in the ./detector/ folder for the Dockerfile
      context: ./detector
      dockerfile: Dockerfile

    container_name: hng-detector
    restart: unless-stopped

    # Start after nginx so the log file exists when we begin tailing
    depends_on:
      nginx:
        condition: service_started

    environment:
      
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}

    volumes:
      # Read Nginx logs from the shared volume (READ-ONLY as required by brief)
      - HNG-nginx-logs:/var/log/nginx:ro

      # Mount config file so you can edit thresholds without rebuilding the image
      # Remove this line if you want config baked into the image
      - ./detector/config.yaml:/app/config.yaml:ro

      # Write audit logs to the host filesystem so they survive container restarts
      # Example audit line:
      # [2026-04-26T10:00:00Z] BAN 1.2.3.4 | z-score=8.4 | rate=47.3 | baseline=0.85 | duration=10min
      - /var/log/detector:/var/log/detector

    ports:
      # The live metrics dashboard is served here    
      - "8080:8080"

    networks:
      - hng-net

    cap_add:
      - NET_ADMIN

    healthcheck:
      # Hit the metrics API — if it responds, the daemon is alive
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:8080/api/metrics || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s