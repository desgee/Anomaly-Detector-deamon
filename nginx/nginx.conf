user  nginx;
worker_processes  auto;                    # one worker per CPU core
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
    use epoll;          # most efficient I/O model on Linux
    multi_accept on;    # accept as many connections as possible at once
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ─────────────────────────────────────────────────────────────────────────
    # Real IP — trust Docker internal ranges so $remote_addr is the actual
    # client IP, not the Docker gateway IP.
    #
    # If your VPS sits behind a cloud load balancer (AWS ALB, Cloudflare, etc.)
    # add those IP ranges here too.
    # ─────────────────────────────────────────────────────────────────────────
    set_real_ip_from  10.0.0.0/8;
    set_real_ip_from  172.16.0.0/12;
    set_real_ip_from  192.168.0.0/16;
    set_real_ip_from  127.0.0.1;
    real_ip_header    X-Forwarded-For;
    real_ip_recursive on;  # walk the full chain to find the original client IP

    # ─────────────────────────────────────────────────────────────────────────
    # JSON access log format
    #
    # Every field name here MUST match what monitor.py looks for:
    #   source_ip     → data.get("source_ip")
    #   timestamp     → data.get("timestamp")  [Unix epoch float via $msec]
    #   method        → data.get("method")
    #   path          → data.get("path")
    #   status        → data.get("status")
    #   response_size → data.get("response_size")
    #
    # $msec = seconds.milliseconds since epoch (e.g. 1714123456.789)
    # monitor.py handles this correctly — it checks if ts > 9_999_999_999
    # and divides by 1000 if so.
    # ─────────────────────────────────────────────────────────────────────────
    log_format json_hng escape=json
        '{'
            '"source_ip":"$remote_addr",'
            '"timestamp":$msec,'
            '"method":"$request_method",'
            '"path":"$request_uri",'
            '"status":$status,'
            '"response_size":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"http_user_agent":"$http_user_agent",'
            '"x_forwarded_for":"$http_x_forwarded_for"'
        '}';

    # Write to the shared volume file (read by detector)
    access_log  /var/log/nginx/hng-access.log  json_hng;

    # Also write to stdout so `docker logs hng-nginx` shows traffic
    access_log  /dev/stdout  json_hng;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    server_tokens  off;   # don't reveal nginx version in headers

    # ─────────────────────────────────────────────────────────────────────────
    # Upstream: the Nextcloud container
    # Docker DNS resolves "nextcloud" to the container's internal IP.
    # ─────────────────────────────────────────────────────────────────────────
    upstream nextcloud_backend {
        server nextcloud:80;
        keepalive 32;    # reuse connections to Nextcloud for efficiency
    }

    # ─────────────────────────────────────────────────────────────────────────
    # Main server block
    # ─────────────────────────────────────────────────────────────────────────
    server {
        listen       80;
        server_name  _;   # accept any hostname or IP

        # Nextcloud supports large file uploads (photos, videos, backups)
        client_max_body_size    10G;
        client_body_buffer_size 128k;

        # Pass real client information to Nextcloud
        proxy_set_header  Host               $host;
        proxy_set_header  X-Real-IP          $remote_addr;
        proxy_set_header  X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header  X-Forwarded-Proto  $scheme;
        proxy_set_header  X-Forwarded-Host   $host;

        proxy_http_version  1.1;
        proxy_set_header    Connection  "";  # keep-alive to upstream
        proxy_buffering     off;             # stream responses directly
        proxy_read_timeout  3600s;           # long timeout for big file transfers
        proxy_send_timeout  3600s;

        # All traffic goes to Nextcloud
        location / {
            proxy_pass http://nextcloud_backend;
        }

        # Nextcloud well-known redirects for CalDAV/CardDAV clients
        location = /.well-known/carddav {
            return 301 /remote.php/dav;
        }
        location = /.well-known/caldav {
            return 301 /remote.php/dav;
        }

        # Health check — does NOT hit Nextcloud, responds immediately
        # Used by load balancers and monitoring tools
        location = /health {
            access_log  off;
            return 200  '{"status":"ok"}';
            add_header  Content-Type application/json;
        }
    }
}